# Pipeline de integração contínua do backend que corre em pushes e pull requests que alterem a pasta backend, prepara um Java 21 com cache de Maven, executa os testes unitários com Mockito e depois os testes de integração com H2 in-memory, e por fim empacota o JAR para garantir que o build de produção também funciona.
name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: sports_store_test
          MYSQL_USER: sportflow
          MYSQL_PASSWORD: sportflow123
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u sportflow -psportflow123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run unit tests (Mockito, no DB)
        working-directory: backend
        run: mvn -q test -pl . -Dtest="*ServiceTest" -DfailIfNoTests=false

      - name: Run integration tests (H2 in-memory)
        working-directory: backend
        run: mvn -q test -Dtest="ApiIntegrationTest" -DfailIfNoTests=false

      - name: Build JAR
        working-directory: backend
        run: mvn -q package -DskipTests
