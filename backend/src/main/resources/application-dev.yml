# Overrides aplicados quando o perfil dev está ativo, aponta para o MySQL local fora do Docker, prolonga a expiração do JWT para 8 horas para evitar logout constante durante o desenvolvimento, e ativa logs de debug no pacote da aplicação para ajudar a diagnosticar problemas.
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sports_store?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: sportflow
    password: sportflow123

app:
  security:
    jwt-secret: dev-sportflow-secret-key-at-least-32-chars-ok
    jwt-expiration-minutes: 480

logging:
  level:
    root: info
    pt.ubi.gruposd.loja: debug
    org.flywaydb: info
