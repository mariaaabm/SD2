# Configuração base da aplicação que define a ligação à base de dados, o Hibernate em modo validate para confiar nas migrações Flyway, o servidor SMTP, o endpoint health do Actuator e os parâmetros de segurança como o segredo JWT e os tempos de expiração, todos parametrizáveis por variáveis de ambiente para diferentes ambientes de execução.
spring:
  application:
    name: sports-store
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sports_store?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:sportflow}
    password: ${SPRING_DATASOURCE_PASSWORD:sportflow123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
    test-connection: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    mail:
      enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt-secret: ${JWT_SECRET:sportflow-secret-key-must-be-at-least-32-chars-long}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
    refresh-expiration-days: ${REFRESH_EXPIRATION_DAYS:7}
  mail:
    enabled: ${MAIL_ENABLED:false}
