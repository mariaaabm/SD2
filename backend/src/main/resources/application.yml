spring:
  application:
    name: shopping-food-store
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shopping_food_store}
    username: ${SPRING_DATASOURCE_USERNAME:store_user}
    password: ${SPRING_DATASOURCE_PASSWORD:store_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-in-production-change-this-secret}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
