spring:
  datasource:
    url: jdbc:h2:mem:shopping_food_store_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  security:
    jwt-secret: test-secret-key-test-secret-key-test-secret-key
    jwt-expiration-minutes: 120

logging:
  level:
    root: warn
    pt.ubi.gruposd.loja: info
