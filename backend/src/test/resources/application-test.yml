# Configuração usada nos testes de integração que substitui o MySQL real por um H2 in-memory em modo MySQL para o ApiIntegrationTest correr sem dependências externas, e fornece um segredo JWT determinístico para os testes serem reprodutíveis.
spring:
  datasource:
    url: jdbc:h2:mem:sports_store_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  security:
    jwt-secret: test-secret-key-test-secret-key-test-secret-key
    jwt-expiration-minutes: 120
    refresh-expiration-days: 7

logging:
  level:
    root: warn
    pt.ubi.gruposd.loja: info
