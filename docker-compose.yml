# Orquestração Docker que arranca toda a stack SportFlow numa única rede privada, com MySQL 8 com healthcheck para o backend só iniciar quando a base de dados está pronta, o backend Spring Boot que aplica as migrações Flyway e expõe a API só dentro da rede, e o frontend nginx que serve a SPA e faz proxy de /api para o backend, exposto em localhost:3000.
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: sports_store
      MYSQL_USER: sportflow
      MYSQL_PASSWORD: sportflow123
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sportflow", "-psportflow123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/sports_store?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: sportflow
      SPRING_DATASOURCE_PASSWORD: sportflow123
      JWT_SECRET: sportflow-secret-key-must-be-at-least-32-chars-long
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
